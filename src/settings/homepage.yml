greeting: "Hey, I'm Autumn! 👋"

bio:
  - "I'm a software engineer at Microsoft Azure Linux specializing in Linux, security, data, and open source. I'm also a podcast co‑host, conference speaker, and mom of three, fueled by coffee, books, and tacos."
  - "I've previously worked at AWS as a NoSQL Solutions Architect and Software Engineer on Amazon Corretto (Java), and earlier served as a Product Manager for Azure Linux Security. I'm active in the open‑source community, have been featured on CNBC, and was nominated for the Snohomish County Emerging Leaders Award."
  - "Beyond my day job, I serve as Education Board Chair for MilSpouse Coders in Greater Seattle, mentor women and students in tech, and recently founded a nonprofit focused on addressing food insecurity. I co‑host the Fork Around and Find Out podcast and speak globally on AI ethics, data bias, cloud security, and diversity in tech."
  - "When I'm not working, you'll find me chasing my kids, 3D printing, reading, or searching for the perfect taco—always with coffee in hand. ☕🌮"

